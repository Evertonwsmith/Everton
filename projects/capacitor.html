<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capacitor Explorer</title>
    <link rel="stylesheet" href="../src/capacitor.css" />
    <link rel="stylesheet" href="../src/theme.css" />
</head>

<body>
     <header>
        <a href="../projects.html">
            <div class="back-button">
                Back to Projects
            </div>
        </a>
    </header>
    <main>
        <div class="title">
            <h1>Capacitor Charging</h1>
        </div>
        <div class="content">
            <div class="card">
                <h2>RC Charging Transient</h2>
                <p>Enter resistor and capacitor values and plot the capacitor voltage over time.</p>
                <div class="inputs">
                    <label>Resistance (kΩ): <input id="resistance" type="number" value="10" min="0.1" step="0.1" /></label>
                    <label>Capacitance (µF): <input id="capacitance" type="number" value="10" min="0.1" step="0.1" /></label>
                    <label>Supply Voltage (V): <input id="voltage" type="number" value="5" min="0.1" step="0.1" /></label>
                </div>
                <button id="plot-btn">Plot Charging Curve</button>
                <p id="tau-value">Time constant τ = 0 ms</p>
            </div>
            <div class="chart-card">
                <canvas id="charging-chart" width="580" height="300"></canvas>
                <p>Capacitor voltage across time during charging (0–5τ).</p>
            </div>
        </div>
    </main>
    <script>
        const resistanceInput = document.getElementById('resistance');
        const capacitanceInput = document.getElementById('capacitance');
        const voltageInput = document.getElementById('voltage');
        const tauValue = document.getElementById('tau-value');
        const plotBtn = document.getElementById('plot-btn');
        const canvas = document.getElementById('charging-chart');
        const ctx = canvas.getContext('2d');

        function formatNumber(v, digits=2){
            return Number(v).toFixed(digits);
        }

        function drawChart() {
            const r = Number(resistanceInput.value) * 1000;
            const c = Number(capacitanceInput.value) * 1e-6;
            const v0 = Number(voltageInput.value);
            if (!r || !c || !v0) {
                tauValue.textContent = 'Invalid input values.';
                return;
            }
            const tau = r * c;
            tauValue.textContent = `Time constant τ = ${formatNumber(tau * 1000, 3)} ms`;

            const width = canvas.width;
            const height = canvas.height;
            ctx.clearRect(0, 0, width, height);

            const padding = 45;
            const plotW = width - padding * 2;
            const plotH = height - padding * 2;
            const tMax = tau * 5;

            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i=0; i<=5; i++) {
                const y = padding + i * (plotH / 5);
                ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(width - padding, y); ctx.stroke();
            }
            for (let i=0; i<=5; i++) {
                const x = padding + i * (plotW / 5);
                ctx.beginPath(); ctx.moveTo(x, padding); ctx.lineTo(x, height - padding); ctx.stroke();
            }

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, height - padding);
            const steps = 120;
            for (let i = 0; i <= steps; i++) {
                const t = (i / steps) * tMax;
                const v = v0 * (1 - Math.exp(-t / tau));
                const x = padding + (t / tMax) * plotW;
                const y = height - padding - (v / v0) * plotH;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.fillText('0', padding - 10, height - padding + 15);
            ctx.fillText('τ', padding + plotW / 5 - 6, height - padding + 15);
            ctx.fillText('2τ', padding + (2 * plotW) / 5 - 12, height - padding + 15);
            ctx.fillText('5τ', padding + plotW - 14, height - padding + 15);

            ctx.fillText('0V', 5, height - padding);
            ctx.fillText(v0.toFixed(1) + 'V', 5, padding+5);

            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();
        }

        plotBtn.addEventListener('click', drawChart);
        drawChart();
    </script>
</body>
</html>
